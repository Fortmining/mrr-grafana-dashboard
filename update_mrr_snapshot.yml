name: MRR Snapshot Update

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create docs/data folder
        run: mkdir -p docs/data scripts

      - name: Copy collector into scripts
        run: cp mrr_collector.py scripts/mrr_collector.py

      - name: Run collector
        env:
          MRR_API_KEY: ${{ secrets.MRR_API_KEY }}
          MRR_API_SECRET: ${{ secrets.MRR_API_SECRET }}
          MRR_RIG_IDS: ${{ secrets.MRR_RIG_IDS }}
          OUTPUT_DIR: docs/data
          RIG_372881_NAME: S9
          RIG_372932_NAME: L3+ 83
          RIG_372933_NAME: L3+ 82
          RIG_372881_FALLBACK_BTC_DAY: ${{ secrets.RIG_372881_FALLBACK_BTC_DAY }}
          RIG_372932_FALLBACK_BTC_DAY: ${{ secrets.RIG_372932_FALLBACK_BTC_DAY }}
          RIG_372933_FALLBACK_BTC_DAY: ${{ secrets.RIG_372933_FALLBACK_BTC_DAY }}
        run: python scripts/mrr_collector.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json scripts/mrr_collector.py
          git diff --staged --quiet || git commit -m "Update MRR snapshot"
          git push
