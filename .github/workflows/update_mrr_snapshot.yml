name: MRR Snapshot Update

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run collector
        env:
          MRR_API_KEY: ${{ secrets.MRR_API_KEY }}
          MRR_API_SECRET: ${{ secrets.MRR_API_SECRET }}
          MRR_RIG_IDS: ${{ secrets.MRR_RIG_IDS }}
        run: |
          mkdir -p data
          python mrr_collector.py

      - name: Show files
        run: |
          echo "Repo files:"
          ls -la
          echo "Data folder:"
          ls -la data || true

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data/*.json || true
          git diff --cached --quiet || git commit -m "Update MRR snapshot"

      - name: Push data
        run: |
          git pull --rebase origin main
          git push origin main
